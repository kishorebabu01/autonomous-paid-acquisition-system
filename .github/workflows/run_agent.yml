# .github/workflows/run_agent.yml
# Purpose: Run the paid acquisition AI system every 6 hours automatically

name: Autonomous Paid Acquisition Agent

on:
  # Run every 6 hours automatically
  schedule:
    - cron: '0 */6 * * *'
  
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-acquisition-agent:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1 — Check out your code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3 — Install all required libraries
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4 — Create .env file from GitHub Secrets
      # This is how secrets safely reach your Python scripts
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "ENVIRONMENT=production" >> .env

      # Step 5 — Generate fresh mock campaign data
      - name: Generate campaign data
        run: python src/data/mock_data_generator.py

      # Step 6 — Run anomaly detection SQL via Python
      - name: Run anomaly detection
        run: python src/models/anomaly_detector.py

      # Step 7 — Run AI agent to process flagged campaigns
      - name: Run AI agent
        run: python src/agent/agent.py